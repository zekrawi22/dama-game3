<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>🎱 بلياردو احترافي</title>
<script src="https://unpkg.com/peerjs@1.5.2"></script>

<style>
body{
  margin:0;
  background:#0d1117;
  color:white;
  text-align:center;
  font-family:sans-serif;
}
canvas{
  background:#0a5c2f;
  margin-top:20px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}
button{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🎱 بلياردو احترافي</h2>

<button onclick="startVoice()">🎙️ صوت</button>

<canvas id="c" width="800" height="400"></canvas>
<audio id="remoteAudio" autoplay></audio>

<script>
// ===== VOICE =====
let peer,conn,localStream,call,isHost=false,roomId="demo";

peer=new Peer();

peer.on('open',id=>{
  console.log("peer:",id);
});

peer.on('call',c=>{
  call=c;
  c.answer(localStream);
  c.on('stream',s=>remoteAudio.srcObject=s);
});

async function startVoice(){
  localStream=await navigator.mediaDevices.getUserMedia({audio:true});
}

// ===== BILLIARD ENGINE =====
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const balls=[];
const friction=0.99;
const radius=10;

function Ball(x,y,color){
  this.x=x;
  this.y=y;
  this.vx=0;
  this.vy=0;
  this.color=color;
}

Ball.prototype.draw=function(){
  ctx.beginPath();
  ctx.arc(this.x,this.y,radius,0,Math.PI*2);
  ctx.fillStyle=this.color;
  ctx.fill();
};

Ball.prototype.update=function(){
  this.x+=this.vx;
  this.y+=this.vy;

  this.vx*=friction;
  this.vy*=friction;

  // wall collision
  if(this.x<radius||this.x>canvas.width-radius) this.vx*=-1;
  if(this.y<radius||this.y>canvas.height-radius) this.vy*=-1;
};

// create balls
balls.push(new Ball(200,200,"white")); // cue

let colors=["red","yellow","blue","black","green"];
for(let i=0;i<5;i++){
  balls.push(new Ball(500+i*22,200+i*5,colors[i]));
}

// ===== COLLISION =====
function collide(b1,b2){
  let dx=b2.x-b1.x;
  let dy=b2.y-b1.y;
  let dist=Math.hypot(dx,dy);

  if(dist<radius*2){
    let angle=Math.atan2(dy,dx);

    let speed1=Math.hypot(b1.vx,b1.vy);
    let speed2=Math.hypot(b2.vx,b2.vy);

    b1.vx=Math.cos(angle)*speed2;
    b1.vy=Math.sin(angle)*speed2;

    b2.vx=Math.cos(angle+Math.PI)*speed1;
    b2.vy=Math.sin(angle+Math.PI)*speed1;
  }
}

// ===== AIM SYSTEM =====
let aiming=false;
let startX,startY;

canvas.onmousedown=e=>{
  aiming=true;
  startX=e.offsetX;
  startY=e.offsetY;
};

canvas.onmouseup=e=>{
  if(!aiming)return;

  let dx=startX-e.offsetX;
  let dy=startY-e.offsetY;

  balls[0].vx=dx*0.1;
  balls[0].vy=dy*0.1;

  aiming=false;
};

// ===== LOOP =====
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // table
  ctx.fillStyle="#0a5c2f";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // collisions
  for(let i=0;i<balls.length;i++){
    for(let j=i+1;j<balls.length;j++){
      collide(balls[i],balls[j]);
    }
  }

  balls.forEach(b=>{
    b.update();
    b.draw();
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
