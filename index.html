<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دامة أونلاين + صوت</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{margin:0;background:#0d1117;color:#fff;font-family:sans-serif;text-align:center}
#menu,#game{padding:20px}
button{padding:10px 15px;margin:5px;border:none;border-radius:8px;cursor:pointer}
canvas{background:#c8954a;margin-top:10px}
#voice{margin-top:10px;display:none}
</style>
</head>

<body>

<div id="menu">
  <h2>🎮 دامة</h2>
  <button onclick="createRoom()">🎲 إنشاء غرفة</button>
  <button onclick="joinRoom()">🔗 انضم</button><br><br>
  <input id="code" placeholder="كود الغرفة">
</div>

<div id="game" style="display:none">
  <h3 id="status"></h3>
  <canvas id="board" width="480" height="480"></canvas>

  <div id="voice">
    <button onclick="startVoice()">🎙️ تشغيل الصوت</button>
    <button onclick="toggleMic()">🔇 كتم</button>
    <button onclick="stopVoice()">❌ إيقاف</button>
  </div>
</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script>
// ================= GAME =================
const N=8,EMPTY=0,D=1,L=2,DK=3,LK=4;
let board=[],turn=D;

function init(){
  board=Array.from({length:N},()=>Array(N).fill(0));
  for(let r=0;r<3;r++)for(let c=0;c<N;c++)if((r+c)%2)board[r][c]=D;
  for(let r=5;r<8;r++)for(let c=0;c<N;c++)if((r+c)%2)board[r][c]=L;
}
init();

const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
const CELL=60;

function draw(){
  ctx.clearRect(0,0,480,480);
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      ctx.fillStyle=(r+c)%2?'#3d1a05':'#c8954a';
      ctx.fillRect(c*CELL,r*CELL,CELL,CELL);

      let p=board[r][c];
      if(p){
        ctx.beginPath();
        ctx.arc(c*CELL+30,r*CELL+30,22,0,Math.PI*2);
        ctx.fillStyle=(p==D||p==DK)?'#111':'#fff';
        ctx.fill();

        if(p==DK||p==LK){
          ctx.fillStyle='gold';
          ctx.fillText('K',c*CELL+25,r*CELL+35);
        }
      }
    }
  }
}
draw();

// ================= PEER =================
let peer,conn,isHost=false,roomId='';

function createRoom(){
  roomId=Math.random().toString(36).substr(2,6);
  alert("Code: "+roomId);

  peer=new Peer('dama-'+roomId);

  peer.on('connection',c=>{
    conn=c;isHost=true;
    setupConn();startGame();
  });

  setupCallListener();
}

function joinRoom(){
  roomId=document.getElementById('code').value;

  peer=new Peer();
  peer.on('open',()=>{
    conn=peer.connect('dama-'+roomId);
    conn.on('open',()=>{setupConn();startGame();});
  });

  setupCallListener();
}

function setupConn(){
  conn.on('data',data=>{
    if(data.type==="voice-ready"){
      if(localStream) callPeer();
    }
  });
}

// ================= VOICE =================
let localStream=null,call=null,micMuted=false;

function setupCallListener(){
  peer.on('call',incoming=>{
    call=incoming;
    incoming.answer(localStream);
    incoming.on('stream',s=>{
      document.getElementById('remoteAudio').srcObject=s;
    });
  });
}

async function startVoice(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true});
    document.getElementById('voice').style.display='block';

    conn.send({type:"voice-ready"});

    if(!isHost) callPeer();

  }catch(e){
    alert("⚠️ خاصك تسمح بالمايك");
  }
}

function callPeer(){
  call=peer.call('dama-'+roomId,localStream);
  call.on('stream',s=>{
    document.getElementById('remoteAudio').srcObject=s;
  });
}

function toggleMic(){
  if(!localStream)return;
  micMuted=!micMuted;
  localStream.getAudioTracks().forEach(t=>t.enabled=!micMuted);
}

function stopVoice(){
  if(call)call.close();
  if(localStream)localStream.getTracks().forEach(t=>t.stop());
}

// ================= FLOW =================
function startGame(){
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('voice').style.display='block';

  document.getElementById('status').innerText =
    isHost?"أنت ⚫":"أنت ⚪";
}
</script>

</body>
</html>
